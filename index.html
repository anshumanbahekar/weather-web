<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather Icons Simple</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔝 CURRENT WEATHER INFO (ADDED) -->
<div class="current-info">
  <h2 id="city">Kota</h2>
  <h1 id="temp">32°C</h1>
  <p id="condition">Sunny</p>
</div>


<!-- 🔥 YOUR ORIGINAL CODE (UNCHANGED) -->

<div class="hot">
  <span class="sun"></span>
  <span class="sunx"></span>
</div>

<div class="cloudy">
  <span class="cloud"></span>
  <span class="cloudx"></span>
</div>

<div class="stormy">
  <ul>
    <li></li><li></li><li></li><li></li>
    <li></li><li></li><li></li><li></li>
  </ul>
  <span class="snowe"></span>
  <span class="snowex"></span>
  <span class="stick"></span>
  <span class="stick2"></span>
</div>

<div class="breezy">
  <ul>
    <li></li><li></li><li></li><li></li><li></li>
  </ul>
  <span class="cloudr"></span>
</div>

<div class="night">
  <span class="moon"></span>
  <span class="spot1"></span>
  <span class="spot2"></span>
  <ul>
    <li></li><li></li><li></li><li></li><li></li>
  </ul>
</div>

<!-- 🔽 FORECAST SECTION (ADDED) -->
<div class="forecast">
  <div class="day">Tomorrow<br>30°C</div>
  <div class="day">Day 2<br>29°C</div>
  <div class="day">Day 3<br>31°C</div>
  <div class="day">Day 4<br>28°C</div>
  <div class="day">Day 5<br>27°C</div>
</div>

<!-- 🔻 FOOTER (ADDED) -->
<div class="footer">
  <p>Weather UI Design</p>
  <div class="logos">
    🌞 ☁️ 🌩️ 🌬️ 🌙
  </div>
</div>

</body>
</html>
