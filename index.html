<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherVerse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.10/css/weather-icons.min.css"/>
<style>
:root {
  --bg: #0a0e1a;
  --card: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.1);
  --text: #f0f4ff;
  --muted: rgba(240,244,255,0.5);
  --accent: #60a5fa;
  --raleway: 'Raleway', sans-serif;
  --mono: 'Space Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow-x:hidden;}

body {
  font-family: var(--raleway);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 2s ease;
  position: relative;
}

/* ── WEATHER BG PARTICLES ── */
#weather-canvas {
  position: fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  z-index:0;
  opacity:0.55;
}
#thunder-overlay {
  position:fixed; top:0;left:0;width:100%;height:100%;
  background:#fff; pointer-events:none; z-index:1;
  opacity:0; transition:opacity 0.05s;
}

.app {
  position:relative; z-index:2;
  max-width:900px; margin:0 auto;
  padding:20px 16px 40px;
}

/* ── HEADER ── */
.header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:22px; flex-wrap:wrap; gap:12px;
}
.logo {
  font-family:var(--mono); font-size:20px; font-weight:700;
  letter-spacing:-1px; color:var(--accent);
}
.logo span { color: var(--text); }

.header-right { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

.lang-select {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:7px 12px; color:var(--text);
  font-family:var(--raleway); font-size:13px; outline:none; cursor:pointer;
}
.gps-btn, .search-btn {
  background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:8px 14px; color:var(--text);
  font-family:var(--raleway); font-size:13px; cursor:pointer;
  transition:background .2s;
}
.gps-btn:hover,.search-btn:hover { background:rgba(255,255,255,0.13); }

.search-row { display:flex; gap:8px; width:100%; margin-bottom:18px; }
.search-input {
  flex:1; background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:12px 18px; color:var(--text);
  font-family:var(--raleway); font-size:15px; outline:none;
}
.search-input::placeholder { color:var(--muted); }
.search-btn-main {
  background:var(--accent); border:none; border-radius:14px;
  padding:12px 22px; color:#0a0e1a; font-family:var(--raleway);
  font-size:15px; font-weight:700; cursor:pointer; transition:opacity .2s;
}
.search-btn-main:hover { opacity:.85; }

/* ── CARDS ── */
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:22px; padding:22px; margin-bottom:16px;
  backdrop-filter:blur(12px);
}

/* ── MAIN WEATHER ── */
.main-top { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px; margin-bottom:18px; }
.city-name { font-size:28px; font-weight:700; }
.city-date { font-size:12px; color:var(--muted); margin-top:4px; }
.clock-box { font-family:var(--mono); font-size:22px; font-weight:700; color:var(--accent); letter-spacing:2px; text-align:right; }
.clock-tz { font-size:11px; color:var(--muted); text-align:right; margin-top:3px; }
.sun-row { font-size:12px; color:var(--muted); margin-top:2px; text-align:right; }

.main-middle { display:flex; align-items:center; gap:20px; margin-bottom:22px; flex-wrap:wrap; }

/* ── ORIGINAL CSS ICON (current) ── */
.current-icon-wrap {
  width:130px; height:130px; border-radius:40%;
  position:relative; flex-shrink:0; z-index:10;
}
/* hot */
.current-icon-wrap.hot { background:linear-gradient(to top right,rgba(255,87,34,1),rgba(251,140,0,1)); box-shadow:1px 1px 30px rgba(255,111,0,1); }
.current-icon-wrap.hot .sun { position:absolute;top:-10%;left:65%;width:50px;height:50px;border-radius:100%;background:linear-gradient(to bottom left,rgba(255,235,59,1),rgba(249,168,37,1));box-shadow:1px 1px 30px rgba(255,160,0,1);animation:inex 3s infinite linear;display:block; }
.current-icon-wrap.hot .sunx { position:absolute;top:30%;left:45%;width:10px;height:10px;border-radius:100%;background:#fff;opacity:.2;display:block; }
/* cloudy */
.current-icon-wrap.cloudy { background:linear-gradient(to top right,rgba(63,81,181,1),rgba(3,155,229,1)); box-shadow:1px 1px 30px rgba(2,119,189,1); }
.current-icon-wrap.cloudy .cloud { position:absolute;top:5%;left:70%;width:60px;height:20px;border-radius:10px;background:rgba(129,212,250,1);box-shadow:1px 1px 30px rgba(0,151,167,1);animation:move 3s infinite linear;display:block; }
.current-icon-wrap.cloudy .cloudx { position:absolute;top:23%;left:55%;width:60px;height:20px;border-radius:10px;background:rgba(129,212,250,1);animation:move 3s infinite linear;display:block; }
/* stormy */
.current-icon-wrap.stormy { background:linear-gradient(to top right,rgba(117,117,117,1),rgba(33,33,33,1)); box-shadow:1px 1px 30px rgba(33,33,33,1); }
.current-icon-wrap.stormy .sl { position:absolute;list-style:none;width:5px;height:5px;border-radius:100%;background:#777;box-shadow:1px 1px 30px #555;animation:fall 3s infinite linear;opacity:0;display:block; }
/* breezy */
.current-icon-wrap.breezy { background:linear-gradient(to top right,rgba(156,204,101,1),rgba(38,198,218,1)); box-shadow:1px 1px 30px rgba(38,198,218,1); }
.current-icon-wrap.breezy .cloudr { position:absolute;top:5%;left:60%;width:60px;height:20px;border-radius:10px;background:rgba(96,125,139,1);box-shadow:1px 1px 30px rgba(84,110,122,1);animation:flash 1.5s infinite linear;display:block; }
.current-icon-wrap.breezy .bl { position:absolute;list-style:none;width:2px;height:7px;border-radius:10%;background:#eee;opacity:0;animation:fall 3s infinite linear;transform:rotate(25deg);display:block; }
/* night */
.current-icon-wrap.night { background:linear-gradient(to bottom right,rgba(63,81,181,1),rgba(171,71,188,1)); box-shadow:1px 1px 30px rgba(81,45,168,1); }
.current-icon-wrap.night .moon { position:absolute;top:-10%;left:65%;width:70px;height:70px;border-radius:100%;background:rgba(255,241,118,1);box-shadow:1px 1px 30px rgba(224,224,224,1);display:block; }
.current-icon-wrap.night .spot1 { position:absolute;top:0%;left:85%;width:10px;height:10px;border-radius:100%;background:#777;display:block; }
.current-icon-wrap.night .spot2 { position:absolute;top:30%;left:75%;width:5px;height:5px;border-radius:100%;background:#777;display:block; }
.current-icon-wrap.night .nl { position:absolute;list-style:none;width:3px;height:3px;border-radius:100%;background:#fff;transform:rotate(45deg);display:block; }

.temp-main { }
.big-temp { font-size:72px; font-weight:200; line-height:1; }
.deg { font-size:32px; opacity:.65; vertical-align:super; }
.cond-desc { font-size:19px; opacity:.85; margin-top:4px; }
.feels { font-size:13px; color:var(--muted); margin-top:3px; }

/* ── THERMOMETER ── */
.thermo-wrap {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:0 10px;
}
.thermo-label { font-size:10px; color:var(--muted); }
.thermo {
  width:22px; height:100px; background:rgba(255,255,255,0.1);
  border-radius:11px; position:relative; overflow:hidden;
  border:1px solid var(--border);
}
.thermo-fill {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(to top,#f44336,#ff9800,#fdd835);
  border-radius:0 0 11px 11px;
  transition: height 1.5s cubic-bezier(.4,0,.2,1);
}
.thermo-bulb {
  width:22px; height:22px; border-radius:50%;
  background:linear-gradient(135deg,#f44336,#ff9800);
  border:1px solid var(--border); margin-top:-2px;
}

/* ── STATS ── */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
@media(max-width:500px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat { background:rgba(255,255,255,0.05); border-radius:14px; padding:13px; text-align:center; }
.stat-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; margin-bottom:5px; }
.stat-val { font-size:20px; font-weight:600; }
.stat-sub { font-size:10px; color:var(--muted); margin-top:2px; }

/* ── AQI ── */
.aqi-bar-bg { height:8px; background:rgba(255,255,255,0.1); border-radius:4px; margin:8px 0 4px; overflow:hidden; }
.aqi-bar { height:8px; border-radius:4px; transition:width 1.2s ease; }
.aqi-row { display:flex; justify-content:space-between; align-items:center; }

/* ── SUGGESTION BOX ── */
.suggestion-box {
  background:linear-gradient(135deg,rgba(96,165,250,.15),rgba(167,139,250,.15));
  border:1px solid rgba(96,165,250,.3);
  border-radius:16px; padding:16px 20px;
  margin-bottom:16px;
}
.sug-title { font-size:12px; color:var(--accent); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.sug-items { display:flex; flex-wrap:wrap; gap:8px; }
.sug-chip {
  background:rgba(255,255,255,0.08); border:1px solid var(--border);
  border-radius:20px; padding:6px 14px; font-size:13px;
}

/* ── HOURLY ── */
.hourly-scroll { display:flex; gap:9px; overflow-x:auto; padding-bottom:4px; }
.hourly-scroll::-webkit-scrollbar{height:3px;}
.hourly-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px;}
.h-card { background:rgba(255,255,255,0.05); border-radius:13px; padding:11px 13px; text-align:center; flex-shrink:0; min-width:65px; }
.h-card.now { background:rgba(96,165,250,.25); border:1px solid rgba(96,165,250,.4); }
.h-time { font-size:11px; color:var(--muted); margin-bottom:7px; }
.h-ico { font-size:18px; margin-bottom:5px; }
.h-temp { font-size:15px; font-weight:600; }

/* ── TEMP GRAPH ── */
#tempCanvas { width:100%; border-radius:12px; display:block; }

/* ── 7-DAY ── */
.day-row { display:flex; align-items:center; padding:11px 0; border-bottom:1px solid rgba(255,255,255,0.06); }
.day-row:last-child{border-bottom:none;}
.day-nm { width:80px; font-size:14px; }
.day-ico { font-size:18px; width:28px; }
.day-cond { flex:1; font-size:12px; color:var(--muted); }
.day-lo { color:var(--muted); font-size:13px; }
.bar-wrap { width:70px; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin:0 8px; }
.bar-fill { height:4px; border-radius:2px; background:linear-gradient(to right,#4facfe,#f093fb); }
.day-hi { font-size:14px; font-weight:600; width:32px; text-align:right; }

/* ── MAP ── */
#map { height:280px; border-radius:18px; overflow:hidden; border:1px solid var(--border); }
.sec-title { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:14px; }

/* ── FAVOURITES ── */
.fav-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.fav-chip {
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; padding:6px 14px 6px 12px; font-size:13px;
  cursor:pointer; display:flex; align-items:center; gap:6px;
  transition:background .2s;
}
.fav-chip:hover{background:rgba(255,255,255,0.12);}
.fav-chip .rm { color:rgba(255,60,60,.7); font-size:11px; cursor:pointer; }
.add-fav-btn {
  background:transparent; border:1px dashed var(--border);
  border-radius:20px; padding:6px 14px; font-size:13px;
  color:var(--muted); cursor:pointer; font-family:var(--raleway);
  transition:all .2s;
}
.add-fav-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── NOTIF BTN ── */
.notif-btn {
  background:rgba(96,165,250,.15); border:1px solid rgba(96,165,250,.3);
  border-radius:12px; padding:9px 16px; color:var(--accent);
  font-family:var(--raleway); font-size:13px; cursor:pointer;
  display:flex; align-items:center; gap:6px;
}

/* ── EXTRA GRID ── */
.extra-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.extra-box { background:rgba(255,255,255,0.05); border-radius:16px; padding:16px; }
.extra-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.7px; margin-bottom:8px; }
.extra-val { font-size:22px; font-weight:300; margin-bottom:3px; }
.extra-sub { font-size:12px; color:var(--muted); }
.uv-bg { height:5px; background:rgba(255,255,255,0.1); border-radius:3px; margin:7px 0 4px; }
.uv-fill { height:5px; border-radius:3px; background:linear-gradient(to right,#56ab2f,#f7971e,#f44336); }

/* ── LOADING / ERROR ── */
.loading { text-align:center; padding:60px; color:var(--muted); }
.spinner { width:36px; height:36px; border:3px solid rgba(255,255,255,0.1); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 14px; }
.err { background:rgba(255,60,60,.1); border:1px solid rgba(255,60,60,.3); border-radius:14px; padding:16px; text-align:center; font-size:14px; margin:10px 0; }

/* ── DAY/NIGHT TINT ── */
body.is-night { --bg: #04060f; }
body.is-day   { --bg: #0a0e1a; }

/* ══════════════════════════════════════
   EXACT ORIGINAL CSS — icons showcase
══════════════════════════════════════ */
.icons-scene {
  background:#fff; border-radius:22px;
  position:relative; width:100%; height:350px;
  overflow:hidden; margin-top:8px;
}
.icons-scene-label {
  font-family:var(--raleway); font-size:11px; color:#aaa;
  text-transform:uppercase; letter-spacing:1px;
  text-align:center; padding-top:14px; display:block;
}
.icons-scene > div { width:130px; height:130px; border-radius:40%; z-index:120; }
.icons-scene .hot { position:absolute; top:25%; left:5%; background:linear-gradient(to top right,rgba(255,87,34,1),rgba(251,140,0,1)); box-shadow:1px 1px 30px rgba(255,111,0,1); }
.icons-scene .sun { position:absolute;top:-10%;left:65%;width:50px;height:50px;border-radius:100%;background:linear-gradient(to bottom left,rgba(255,235,59,1),rgba(249,168,37,1));box-shadow:1px 1px 30px rgba(255,160,0,1);animation:inex 3s infinite linear; }
.icons-scene .sunx { position:absolute;top:30%;left:45%;width:10px;height:10px;border-radius:100%;background-color:#fff;opacity:.2; }
.icons-scene .cloudy { position:absolute;top:25%;left:25%;background:linear-gradient(to top right,rgba(63,81,181,1),rgba(3,155,229,1));box-shadow:1px 1px 30px rgba(2,119,189,1); }
.icons-scene .cloud { position:absolute;top:5%;left:70%;width:60px;height:20px;border-radius:10px;background-color:rgba(129,212,250,1);box-shadow:1px 1px 30px rgba(0,151,167,1);animation:move 3s infinite linear; }
.icons-scene .cloudx { position:absolute;top:23%;left:55%;width:60px;height:20px;border-radius:10px;background-color:rgba(129,212,250,1);animation:move 3s infinite linear; }
.icons-scene .stormy { position:absolute;top:25%;left:47%;background:linear-gradient(to top right,rgba(117,117,117,1),rgba(33,33,33,1));box-shadow:1px 1px 30px rgba(33,33,33,1); }
.icons-scene .stormy li { position:absolute;list-style:none;width:5px;height:5px;border-radius:100%;background-color:#777;box-shadow:1px 1px 30px #555;animation:fall 3s infinite linear;opacity:0; }
.icons-scene .stormy li:nth-child(1){top:0%;left:100%;}
.icons-scene .stormy li:nth-child(2){top:5%;left:90%;}
.icons-scene .stormy li:nth-child(3){top:-10%;left:80%;animation-delay:2s;}
.icons-scene .stormy li:nth-child(4){top:10%;left:100%;animation-delay:2s;}
.icons-scene .stormy li:nth-child(5){top:20%;left:80%;animation-delay:.5s;}
.icons-scene .stormy li:nth-child(6){top:35%;left:70%;background-color:#bbb;animation-delay:.5s;}
.icons-scene .stormy li:nth-child(7){top:23%;left:60%;background-color:#bbb;animation-delay:.8s;}
.icons-scene .stormy li:nth-child(8){top:5%;left:70%;background-color:#bbb;animation-delay:.8s;}
.icons-scene .snowe{position:absolute;top:60%;left:40%;width:40px;height:40px;border-radius:60px;background-color:#ddd;}
.icons-scene .snowex{position:absolute;top:50%;left:50%;width:15px;height:15px;border-radius:15px;background-color:#bbb;}
.icons-scene .stick{position:absolute;top:60%;left:40%;width:3px;height:15px;transform:rotate(-45deg);background-color:#333;z-index:-10;}
.icons-scene .stick2{position:absolute;top:60%;left:70%;width:3px;height:15px;transform:rotate(45deg);background-color:#333;z-index:-10;}
.icons-scene .breezy{position:absolute;top:60%;left:5%;background:linear-gradient(to top right,rgba(156,204,101,1),rgba(38,198,218,1));box-shadow:1px 1px 30px rgba(38,198,218,1);}
.icons-scene .cloudr{position:absolute;top:5%;left:60%;width:60px;height:20px;border-radius:10px;background-color:rgba(96,125,139,1);box-shadow:1px 1px 30px rgba(84,110,122,1);animation:flash 1.5s infinite linear;}
.icons-scene .breezy li{position:absolute;list-style:none;width:2px;height:7px;border-radius:10%;background-color:#eee;opacity:0;animation:fall 3s infinite linear;transform:rotate(25deg);}
.icons-scene .breezy li:nth-child(1){top:10%;left:95%;}
.icons-scene .breezy li:nth-child(2){top:5%;left:83%;animation-delay:.3s;}
.icons-scene .breezy li:nth-child(3){top:4%;left:87%;animation-delay:.6s;}
.icons-scene .breezy li:nth-child(4){top:15%;left:70%;animation-delay:1s;}
.icons-scene .breezy li:nth-child(5){top:10%;left:75%;}
.icons-scene .night{position:absolute;top:60%;left:47%;background:linear-gradient(to bottom right,rgba(63,81,181,1),rgba(171,71,188,1));box-shadow:1px 1px 30px rgba(81,45,168,1);}
.icons-scene .moon{position:absolute;top:-10%;left:65%;width:70px;height:70px;border-radius:100%;background:rgba(255,241,118,1);box-shadow:1px 1px 30px rgba(224,224,224,1);}
.icons-scene .spot1{position:absolute;top:0%;left:85%;width:10px;height:10px;border-radius:100%;background-color:#777;}
.icons-scene .spot2{position:absolute;top:30%;left:75%;width:5px;height:5px;border-radius:100%;background-color:#777;}
.icons-scene .night li{position:absolute;list-style:none;width:3px;height:3px;border-radius:100%;background-color:#fff;transform:rotate(45deg);}
.icons-scene .night li:nth-child(1){top:30%;left:65%;}
.icons-scene .night li:nth-child(2){top:35%;left:53%;}
.icons-scene .night li:nth-child(3){opacity:0;top:20%;left:75%;width:2px;height:2px;animation:meteor 1.5s infinite linear;animation-delay:.6s;}
.icons-scene .night li:nth-child(4){top:5%;left:50%;}
.icons-scene .night li:nth-child(5){opacity:0;top:20%;left:55%;width:1px;height:15px;animation:meteor 1.5s infinite linear;}
.icons-scene .icon-lbl{position:absolute;font-family:var(--raleway);font-size:11px;color:#aaa;white-space:nowrap;}

@keyframes inex{50%{opacity:.4;}60%{opacity:1;}}
@keyframes move{50%{transform:translateX(-10px);}}
@keyframes fall{10%{opacity:.8;}50%{opacity:1;transform:translate(-10px,30px);}100%{transform:translate(-25px,70px);}}
@keyframes flash{48%{background-color:rgba(96,125,139,1);}50%{background-color:#fff;}55%{background-color:rgba(96,125,139,1);}57%{background-color:#fff;}}
@keyframes meteor{10%{opacity:1;}80%{left:10%;top:75%;opacity:0;}}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<canvas id="weather-canvas"></canvas>
<div id="thunder-overlay"></div>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Weather<span>Verse</span></div>
    <div class="header-right">
      <select class="lang-select" id="langSel" onchange="setLang(this.value)">
        <option value="en">🇬🇧 English</option>
        <option value="hi">🇮🇳 हिन्दी</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="es">🇪🇸 Español</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="ar">🇸🇦 العربية</option>
      </select>
      <button class="gps-btn" onclick="useGPS()"><i class="wi wi-earthquake" style="margin-right:5px;font-size:14px;"></i>My Location</button>
      <button class="notif-btn" id="notifBtn" onclick="toggleNotif()"><i class="wi wi-raindrops" style="margin-right:5px;font-size:14px;"></i>Alerts</button>
    </div>
  </div>

  <!-- FAVOURITES -->

/* ── TIME / CLOCK ── */
function fmtTime(unix,tz){
  const d=new Date((unix+tz)*1000);
  const h=d.getUTCHours(), m=d.getUTCMinutes();
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}
function fmtHour(unix,tz){
  const d=new Date((unix+tz)*1000);
  const h=d.getUTCHours();
  return h===0?'12 AM':h<12?h+' AM':h===12?'12 PM':(h-12)+' PM';
}
function startClock(tz){
  if(clockInterval)clearInterval(clockInterval);
  function tick(){
    const now=Math.floor(Date.now()/1000);
    const d=new Date((now+tz)*1000);
    const h=String(d.getUTCHours()).padStart(2,'0');
    const m=String(d.getUTCMinutes()).padStart(2,'0');
    const s=String(d.getUTCSeconds()).padStart(2,'0');
    const el=document.getElementById('live-clock');
    if(el)el.textContent=h+':'+m+':'+s;
  }
  tick();
  clockInterval=setInterval(tick,1000);
}
function dayName(unix,tz,i){
  if(i===0)return'Today';if(i===1)return'Tomorrow';
  const d=new Date((unix+tz)*1000);
  return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getUTCDay()];
}

/* ── DAY/NIGHT CHECK ── */
function checkDayNight(cur){
  const now=cur.dt+cur.timezone;
  const sr=cur.sys.sunrise+cur.timezone;
  const ss=cur.sys.sunset+cur.timezone;
  const isNight=now<sr||now>ss;
  document.body.classList.toggle('is-night',isNight);
  document.body.classList.toggle('is-day',!isNight);
  return isNight;
}

/* ── PARTICLE BG ── */
const canvas=document.getElementById('weather-canvas');
const ctx=canvas.getContext('2d');
let particles=[], particleType='none', animFrame;

function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resizeCanvas);resizeCanvas();

function initParticles(type){
  particleType=type; particles=[];
  const count=type==='rain'?180:type==='snow'?120:type==='thunder'?60:0;
  for(let i=0;i<count;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      len:type==='rain'?Math.random()*15+8:0,
      size:type==='snow'?Math.random()*4+1:type==='thunder'?Math.random()*3+1:0,
      speed:type==='rain'?Math.random()*8+6:type==='snow'?Math.random()*1.5+0.3:Math.random()*3+1,
      opacity:Math.random()*0.7+0.3,
      angle:type==='rain'?0.2:0,
    });
  }
}

let thunderTimer=0;
function animateParticles(){
  animFrame=requestAnimationFrame(animateParticles);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(particleType==='rain'){
    ctx.strokeStyle='rgba(174,214,241,0.6)';
    ctx.lineWidth=1;
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x+p.len*Math.sin(p.angle),p.y+p.len);
      ctx.stroke();
      p.y+=p.speed; p.x+=Math.sin(p.angle)*p.speed*0.4;
      if(p.y>canvas.height){p.y=-p.len;p.x=Math.random()*canvas.width;}
    });
  } else if(particleType==='snow'){
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(220,235,255,${p.opacity})`;
      ctx.fill();
      p.y+=p.speed; p.x+=Math.sin(Date.now()*0.001+p.x)*0.4;
      if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width;}
    });
  } else if(particleType==='thunder'){
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(174,214,241,${p.opacity*0.5})`;
      ctx.fill();
      p.y+=p.speed;
      if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width;}
    });
    thunderTimer--;
    if(thunderTimer<=0){
      const ov=document.getElementById('thunder-overlay');
      ov.style.opacity='0.15';
      setTimeout(()=>{ov.style.opacity='0';},60);
      thunderTimer=Math.floor(Math.random()*180+60);
    }
  }
}
animateParticles();

function wi(cls,txt){ return `<i class="wi ${cls}" style="margin-right:5px;font-size:15px;"></i>${txt}`; }
function getSuggestions(temp,id,wind,humidity){
  const c=String(id); const chips=[];
  if(temp>35)chips.push(wi('wi-hot','Stay hydrated'),wi('wi-thermometer','Stay indoors'),wi('wi-day-sunny','Apply sunscreen'));

  else chips.push(wi('wi-snowflake-cold','Bundle up!'),wi('wi-snow','Very cold outside'));
  if(c.startsWith('2')||c.startsWith('5')||c.startsWith('3'))chips.push(wi('wi-umbrella','Carry umbrella'),wi('wi-rain','Drive carefully'));
  if(c.startsWith('6'))chips.push(wi('wi-snow','Snow gear needed'),wi('wi-snowflake-cold','Icy roads'));

/* ── TEMP GRAPH ── */
function drawTempGraph(days,tz){
  const c=document.getElementById('tempCanvas');
  if(!c)return;
  const W=c.offsetWidth||600; const H=150;
  c.width=W; c.height=H;
  const cx=c.getContext('2d');
  const hi=days.map(d=>d.hi), lo=days.map(d=>d.lo);
  const allT=[...hi,...lo];
  const mn=Math.min(...allT)-2, mx=Math.max(...allT)+2;
  const xStep=W/Math.max(days.length-1,1);
  function yPos(t){return H-10-((t-mn)/(mx-mn))*(H-20);}
  // hi line
  cx.beginPath();
  days.forEach((d,i)=>{i===0?cx.moveTo(0,yPos(d.hi)):cx.lineTo(i*xStep,yPos(d.hi));});
  cx.strokeStyle='rgba(249,168,37,.9)'; cx.lineWidth=2.5; cx.stroke();
  // lo line
  cx.beginPath();
  days.forEach((d,i)=>{i===0?cx.moveTo(0,yPos(d.lo)):cx.lineTo(i*xStep,yPos(d.lo));});
  cx.strokeStyle='rgba(96,165,250,.9)'; cx.lineWidth=2.5; cx.stroke();
  // dots + labels
  days.forEach((d,i)=>{
    const x=i*xStep;
    cx.beginPath();cx.arc(x,yPos(d.hi),4,0,Math.PI*2);cx.fillStyle='rgba(249,168,37,1)';cx.fill();
    cx.beginPath();cx.arc(x,yPos(d.lo),4,0,Math.PI*2);cx.fillStyle='rgba(96,165,250,1)';cx.fill();
    cx.fillStyle='rgba(255,255,255,0.8)';cx.font='10px Raleway';cx.textAlign='center';
    cx.fillText(Math.round(d.hi)+'°',x,yPos(d.hi)-8);
    cx.fillText(Math.round(d.lo)+'°',x,yPos(d.lo)+16);
    cx.fillStyle='rgba(255,255,255,0.4)';
    cx.fillText(dayName(d.dt,tz,i).slice(0,3),x,H-1);
  });
}

function renderAll(data){
  const {cur,fc,aqi}=data;
  const tz=cur.timezone;
  const id=cur.weather[0].id;
  const isNight=checkDayNight(cur);
  const cls=iconClass(id,isNight);
  setWeatherFX(id);
  setBgGradient(id,isNight);
  startClock(tz);

  const temp=Math.round(cur.main.temp);
  const feel=Math.round(cur.main.feels_like);
  const hum=cur.main.humidity;
  const vis=(cur.visibility/1000).toFixed(1);
  const wind=Math.round(cur.wind.speed*3.6);
  const pres=cur.main.pressure;
  const dew=Math.round(cur.main.temp-((100-hum)/5));
  const sr=fmtTime(cur.sys.sunrise,tz);
  const ss=fmtTime(cur.sys.sunset,tz);
  const city=cur.name+', '+cur.sys.country;
  const lat=cur.coord.lat, lon=cur.coord.lon;
  const desc=cur.weather[0].description;

  // Hourly
  const hourly=fc.list.slice(0,8).map((h,i)=>({time:i===0?'Now':fmtHour(h.dt,tz),temp:Math.round(h.main.temp),id:h.weather[0].id}));

  // Daily
  const dayMap={};
  fc.list.forEach(h=>{
    const d=new Date((h.dt+tz)*1000);
    const key=d.getUTCFullYear()+'-'+(d.getUTCMonth()+1)+'-'+d.getUTCDate();
    if(!dayMap[key])dayMap[key]={hi:-999,lo:999,id:h.weather[0].id,dt:h.dt};
    if(h.main.temp_max>dayMap[key].hi)dayMap[key].hi=h.main.temp_max;
    if(h.main.temp_min<dayMap[key].lo)dayMap[key].lo=h.main.temp_min;
  });
  const days=Object.values(dayMap).slice(0,7);
  const absHi=Math.max(...days.map(d=>d.hi)), absLo=Math.min(...days.map(d=>d.lo));

  // AQI
  const aqiVal=aqi&&aqi.list&&aqi.list[0]?aqi.list[0].main.aqi:null;
  const aqiComp=aqi&&aqi.list&&aqi.list[0]?aqi.list[0].components:{};

  // Suggestions
  const sugs=getSuggestions(temp,id,wind,hum);

  // Date
  const nowD=new Date((cur.dt+tz)*1000);
  const dateStr=nowD.toUTCString().slice(0,16);

  // TZ offset label
  const offH=Math.floor(Math.abs(tz)/3600);
  const offM=Math.floor((Math.abs(tz)%3600)/60);
  const tzStr='UTC'+(tz>=0?'+':'-')+offH+(offM?':'+String(offM).padStart(2,'0'):'');

  const html=`
  <!-- MAIN CARD -->
  <div class="card">
    <div class="main-top">
      <div>
        <div class="city-name"><i class="wi wi-earthquake" style="font-size:18px;margin-right:6px;opacity:.7;"></i>${city}</div>
        <div class="city-date">${dateStr}</div>
        <button class="add-fav-btn" style="margin-top:8px;" onclick="addFav('${cur.name}')"><i class="wi wi-stars" style="margin-right:5px;"></i>${t('addFav')}</button>
      </div>
      <div>
        <div class="clock-box" id="live-clock">--:--:--</div>
        <div class="clock-tz">${tzStr}</div>
        <div class="sun-row"><i class="wi wi-sunrise" style="font-size:15px;margin-right:4px;"></i>${sr} &nbsp; <i class="wi wi-sunset" style="font-size:15px;margin-right:4px;"></i>${ss}</div>
      </div>
    </div>

    <div class="main-middle">
      ${buildIconHTML(cls)}
      <div class="temp-main">
        <div style="display:flex;align-items:flex-start;gap:4px;">
          <span class="big-temp">${temp}</span><span class="deg">°C</span>
        </div>
        <div class="cond-desc">${desc.charAt(0).toUpperCase()+desc.slice(1)}</div>
        <div class="feels">${t('feels')} ${feel}°C</div>
      </div>
      <div class="thermo-wrap" style="margin-left:auto;">
        <div class="thermo-label">${temp}°</div>
        <div class="thermo"><div class="thermo-fill" id="thermo-fill" style="height:0%"></div></div>
        <div class="thermo-bulb"></div>
        <div class="thermo-label"><i class="wi wi-thermometer" style="font-size:14px;"></i></div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat"><div class="stat-lbl"><i class="wi wi-humidity" style="font-size:14px;margin-right:4px;"></i>${t('humidity')}</div><div class="stat-val">${hum}%</div><div class="stat-sub">${t('dewPt')} ${dew}°C</div></div>
      <div class="stat"><div class="stat-lbl"><i class="wi wi-strong-wind" style="font-size:14px;margin-right:4px;"></i>${t('wind')}</div><div class="stat-val">${wind}</div><div class="stat-sub">km/h</div></div>
      <div class="stat"><div class="stat-lbl"><i class="wi wi-day-fog" style="font-size:14px;margin-right:4px;"></i>${t('visibility')}</div><div class="stat-val">${vis}</div><div class="stat-sub">km</div></div>
      <div class="stat"><div class="stat-lbl"><i class="wi wi-barometer" style="font-size:14px;margin-right:4px;"></i>${t('pressure')}</div><div class="stat-val">${pres}</div><div class="stat-sub">mb</div></div>
    </div>
  </div>

  <!-- AQI CARD -->
  ${aqiVal ? `<div class="card">
    <div class="sec-title"><i class="wi wi-smoke" style="font-size:14px;margin-right:6px;"></i>${t('aqi')}</div>
    <div class="aqi-row">
      <div><div style="font-size:28px;font-weight:300;">${aqiLabel(aqiVal)}</div><div style="font-size:13px;color:var(--muted);">AQI ${aqiVal}/5</div></div>
      <div style="text-align:right;font-size:12px;color:var(--muted);">
        <div>PM2.5: ${aqiComp.pm2_5?aqiComp.pm2_5.toFixed(1):'-'} μg/m³</div>
        <div>PM10: ${aqiComp.pm10?aqiComp.pm10.toFixed(1):'-'} μg/m³</div>
        <div>NO₂: ${aqiComp.no2?aqiComp.no2.toFixed(1):'-'} μg/m³</div>
        <div>O₃: ${aqiComp.o3?aqiComp.o3.toFixed(1):'-'} μg/m³</div>
      </div>
    </div>
    <div class="aqi-bar-bg"><div class="aqi-bar" style="width:${(aqiVal/5)*100}%;background:${aqiColor(aqiVal)};"></div></div>
  </div>` : ''}

  <!-- SUGGESTIONS -->
  <div class="suggestion-box">
    <div class="sug-title"><i class="wi wi-day-sunny" style="font-size:15px;margin-right:6px;"></i>${t('suggestions')} — ${t('outfits')}</div>
    <div class="sug-items">${sugs.map(s=>`<span class="sug-chip">${s}</span>`).join('')}</div>
  </div>

  <!-- HOURLY -->
  <div class="card">
    <div class="sec-title"><i class="wi wi-time-1" style="font-size:13px;margin-right:6px;"></i>${t('hourly')}</div>
    <div class="hourly-scroll">
      ${hourly.map((h,i)=>`<div class="h-card ${i===0?'now':''}"><div class="h-time">${h.time}</div><div class="h-ico">${owmEmoji(h.id,isNight)}</div><div class="h-temp">${h.temp}°</div></div>`).join('')}
    </div>
  </div>

  <!-- TEMP GRAPH -->
  <div class="card">
    <div class="sec-title"><i class="wi wi-thermometer" style="font-size:13px;margin-right:6px;"></i>Temperature Graph (7 days)</div>
    <div style="margin-bottom:8px;display:flex;gap:16px;">
      <span style="font-size:12px;color:rgba(249,168,37,1);"><i class="wi wi-thermometer-exterior"></i> High</span>
      <span style="font-size:12px;color:rgba(96,165,250,1);"><i class="wi wi-thermometer-exterior"></i> Low</span>
    </div>
    <canvas id="tempCanvas"></canvas>
  </div>

  <!-- 7 DAY -->
  <div class="card">
    <div class="sec-title"><i class="wi wi-forecast-io-partly-cloudy-day" style="font-size:13px;margin-right:6px;"></i>${t('weekly')}</div>
    ${days.map((d,i)=>{
      const pct=absHi===absLo?50:((d.hi-absLo)/(absHi-absLo))*100;
      const cn=String(d.id).startsWith('2')?'Storm':String(d.id).startsWith('5')||String(d.id).startsWith('3')?'Rain':String(d.id).startsWith('6')?'Snow':String(d.id).startsWith('7')?'Fog':d.id===800?'Clear':'Clouds';
      return `<div class="day-row"><div class="day-nm">${dayName(d.dt,tz,i)}</div><div class="day-ico">${owmEmoji(d.id,isNight)}</div><div class="day-cond">${cn}</div><div class="day-lo">${Math.round(d.lo)}°</div><div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(pct)}%"></div></div><div class="day-hi">${Math.round(d.hi)}°</div></div>`;
    }).join('')}
  </div>

  <!-- EXTRA -->
  <div class="extra-grid" style="margin-bottom:16px;">
    <div class="extra-box"><div class="extra-lbl"><i class="wi wi-day-sunny" style="font-size:13px;margin-right:4px;"></i>${t('uvIndex')}</div><div class="extra-val">—</div><div class="uv-bg"><div class="uv-fill" style="width:40%"></div></div><div class="extra-sub">Moderate (est.)</div></div>
    <div class="extra-box"><div class="extra-lbl"><i class="wi wi-thermometer" style="font-size:13px;margin-right:4px;"></i>${t('range')}</div><div class="extra-val">${Math.round(days[0].lo)}° – ${Math.round(days[0].hi)}°</div><div class="extra-sub">Low / High</div></div>
    <div class="extra-box"><div class="extra-lbl"><i class="wi wi-sunrise" style="font-size:13px;margin-right:4px;"></i>${t('sunrise')}</div><div class="extra-val" style="font-size:20px;">${sr}</div><div class="extra-sub"><i class="wi wi-sunset" style="font-size:12px;margin-right:3px;"></i>${t('sunset')} at ${ss}</div></div>
    <div class="extra-box"><div class="extra-lbl"><i class="wi wi-raindrop" style="font-size:13px;margin-right:4px;"></i>${t('dewPt')}</div><div class="extra-val" style="font-size:20px;">${dew}°C</div><div class="extra-sub"><i class="wi wi-humidity" style="font-size:12px;margin-right:3px;"></i>${t('humidity')} ${hum}%</div></div>
  </div>

  <!-- MAP -->
  <div class="card" style="padding:14px;">
    <div class="sec-title"><i class="wi wi-rain" style="font-size:13px;margin-right:6px;"></i>${t('map')} — Precipitation Layer</div>
    <div id="map"></div>
  </div>
  `;

  document.getElementById('weatherContent').innerHTML=html;

  // Animate thermometer
  setTimeout(()=>{
    const tf=document.getElementById('thermo-fill');
    if(tf)tf.style.height=thermoHeight(temp);
  },200);

  // Draw graph
  setTimeout(()=>drawTempGraph(days,tz),100);

  // Init map
  setTimeout(()=>initMap(lat,lon,city),300);

  // Clock
  startClock(tz);

  // Rain alert
  if(notifEnabled&&String(id).startsWith('5')&&notifCity!==city){
    notifCity=city;
    if(Notification.permission==='granted'){
      new Notification('🌧️ Rain Alert — '+city,{body:'Rain detected! Carry an umbrella.',icon:''});
    }
  }
}

/* ── FETCH ── */
async function loadWeather(city){
  const el=document.getElementById('weatherContent');
  el.innerHTML=`<div class="loading"><div class="spinner"></div><div>${t('loading')}</div></div>`;
  try {
    const [curR,fcR]=await Promise.all([
      fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API}&units=metric`),
      fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(city)}&appid=${API}&units=metric`)
    ]);
    if(!curR.ok)throw new Error('City not found: '+city);
    const cur=await curR.json();
    const fc=await fcR.json();
    // AQI
    let aqi=null;
    try {
      const aqiR=await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${cur.coord.lat}&lon=${cur.coord.lon}&appid=${API}`);
      aqi=await aqiR.json();
    } catch(e){}
    lastData={cur,fc,aqi};
    renderAll(lastData);
    renderFavs();
  } catch(e){
    el.innerHTML=`<div class="err">❌ ${e.message}</div>`;
  }
}

async function loadWeatherByCoords(lat,lon){
  const el=document.getElementById('weatherContent');
  el.innerHTML=`<div class="loading"><div class="spinner"></div><div>${t('loading')}</div></div>`;
  try {
    const [curR,fcR]=await Promise.all([
      fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API}&units=metric`),
      fetch(`https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&appid=${API}&units=metric`)
    ]);
    const cur=await curR.json();
    const fc=await fcR.json();
    let aqi=null;
    try{const aqiR=await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${API}`);aqi=await aqiR.json();}catch(e){}
    lastData={cur,fc,aqi};
    renderAll(lastData);
    renderFavs();
  } catch(e){
    el.innerHTML=`<div class="err">❌ ${e.message}</div>`;
  }
}

/* ── GPS ── */
function useGPS(){
  if(!navigator.geolocation){alert('Geolocation not supported');return;}
  document.getElementById('weatherContent').innerHTML=`<div class="loading"><div class="spinner"></div><div>📍 Getting your location…</div></div>`;
  navigator.geolocation.getCurrentPosition(
    p=>loadWeatherByCoords(p.coords.latitude,p.coords.longitude),
    ()=>loadWeather('Kota,IN')
  );
}

/* ── SEARCH ── */
function doSearch(){
  const v=document.getElementById('cityInput').value.trim();
  if(v)loadWeather(v);
}
document.getElementById('cityInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

/* ── FAVOURITES ── */
function addFav(city){
  if(!favs.includes(city)){favs.push(city);localStorage.setItem('wv_favs',JSON.stringify(favs));}
  renderFavs();
}
function removeFav(city){
  favs=favs.filter(f=>f!==city);
  localStorage.setItem('wv_favs',JSON.stringify(favs));
  renderFavs();
}
function renderFavs(){
  const row=document.getElementById('favRow');
  if(!row)return;
  row.innerHTML=favs.length?
    favs.map(f=>`<div class="fav-chip" onclick="loadWeather('${f}')"><i class="wi wi-stars" style="font-size:13px;"></i> ${f} <span class="rm" onclick="event.stopPropagation();removeFav('${f}')">✕</span></div>`).join('')
    :'';
}

/* ── NOTIFICATIONS ── */
function toggleNotif(){
  if(!notifEnabled){
    Notification.requestPermission().then(p=>{
      if(p==='granted'){notifEnabled=true;document.getElementById('notifBtn').innerHTML='<i class="wi wi-raindrops" style="margin-right:5px;font-size:14px;"></i>Alerts ON';}
    });
  } else {
    notifEnabled=false;
    document.getElementById('notifBtn').innerHTML='<i class="wi wi-raindrops" style="margin-right:5px;font-size:14px;"></i>Alerts';
  }
}

/* ── BOOT ── */
renderFavs();
useGPS();
</script>
</body>
</html>
