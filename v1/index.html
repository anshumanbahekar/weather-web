<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather UI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🌦 Weather Dashboard</h1>

<div class="container">

  <div class="card sunny">
    <div class="sun"></div>
    <p>Sunny</p>
  </div>

  <div class="card cloudy">
    <div class="cloud"></div>
    <p>Cloudy</p>
  </div>

  <div class="card storm">
    <div class="rain"></div>
    <p>Storm</p>
  </div>

  <div class="card night">
    <div class="moon"></div>
    <p>Night</p>
  </div>

</div>

</body>
</html>
